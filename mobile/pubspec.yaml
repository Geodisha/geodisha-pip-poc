name: geodisha_mobile
description: GeoDisha Political Intelligence Mobile Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Authentication & Firebase
  #firebase_core: ^2.24.2
  #firebase_auth: ^4.15.3
  #cloud_firestore: ^4.13.6
  # firebase_messaging: ^14.7.10  # Not currently used
  #firebase_analytics: ^10.7.4
  # firebase_crashlytics: ^5.0.5
  # firebase_storage: ^13.0.4

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  # graphql_flutter: ^5.1.2  # Disabled for now

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI/UX
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  fl_chart: ^0.65.0
  syncfusion_flutter_charts: ^24.1.41

  # Advanced UI
  percent_indicator: ^4.2.3
  card_swiper: ^3.0.1
  animate_do: ^3.3.4
  glassmorphism: ^3.0.0

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  path_provider: ^2.1.1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  image_picker: ^1.0.5
  pinput: ^3.0.1
  flutter_otp_text_field: ^1.1.3+2
  flutter_local_notifications: ^16.3.0

  # Monitoring (TEMPORARILY DISABLED)
  # sentry_flutter: ^7.13.2

  # Others
  freezed_annotation: ^2.4.1
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2
  google_fonts: ^8.1.0
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

