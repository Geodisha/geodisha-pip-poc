name: Full Deploy (API then Web)

# Manual trigger only - use this for the very first deployment
# or when you need to deploy both together
on:
  workflow_dispatch:
    inputs:
      api_url_override:
        description: 'Skip API deploy - use this existing API URL instead (leave blank to deploy fresh API)'
        required: false
        default: ''

env:
  PROJECT_ID:   geo-pulse-463507
  REGION:       asia-south1
  REGISTRY:     asia-south1-docker.pkg.dev
  API_IMAGE:    asia-south1-docker.pkg.dev/geo-pulse-463507/docker/geodisha-pip-api
  WEB_IMAGE:    asia-south1-docker.pkg.dev/geo-pulse-463507/docker/geodisha-pip-web
  API_SERVICE:  geodisha-pip-api
  WEB_SERVICE:  geodisha-pip-web
  WIF_PROVIDER: projects/48276813435/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  SA_EMAIL:     github-actions-sa@geo-pulse-463507.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

jobs:

  # ============================================================
  # JOB 1 - Deploy backend API
  # Outputs the deployed Cloud Run URL for Job 2 to consume
  # ============================================================
  deploy-api:
    name: 1 - Deploy API
    runs-on: ubuntu-latest
    # Only run Job 1 if no override URL was supplied
    if: ${{ inputs.api_url_override == '' }}
    outputs:
      api_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push API image
        run: |
          docker build \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            ./backend
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Deploy API to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.API_IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=60

      - name: API deployed
        run: echo "API URL is ${{ steps.deploy.outputs.url }}"

  # ============================================================
  # JOB 2 - Build Flutter web and deploy frontend
  # Waits for Job 1, uses its output URL to patch the app
  # If api_url_override was supplied, Job 1 is skipped and
  # this job uses the override URL directly
  # ============================================================
  deploy-web:
    name: 2 - Deploy Flutter Web
    runs-on: ubuntu-latest
    needs: [deploy-api]
    if: ${{ always() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # Determine API URL: Job 1 output takes priority, then manual override
      - name: Patch API base URL
        working-directory: mobile
        run: |
          API_URL="${{ needs.deploy-api.outputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_URL="${{ inputs.api_url_override }}"
          fi
          if [ -z "$API_URL" ]; then
            echo "ERROR: No API URL available. Either deploy API first or supply api_url_override"
            exit 1
          fi
          echo "Patching baseUrl to: ${API_URL}"
          sed -i "s|http://localhost:8000|${API_URL}|g" lib/core/constants/api_endpoints.dart
          grep "baseUrl" lib/core/constants/api_endpoints.dart

      - name: Build Flutter Web
        working-directory: mobile
        run: |
          flutter build web \
            --release \
            --base-href / \

      - name: Build and push Web image
        working-directory: mobile
        run: |
          docker build \
            -t ${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WEB_IMAGE }}:latest \
            .
          docker push ${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WEB_IMAGE }}:latest

      - name: Deploy Web to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.WEB_IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=3

      - name: Deployment summary
        run: |
          echo "================================================"
          echo "GeoDisha PIP POC - Deployed!"
          echo "Web App : ${{ steps.deploy.outputs.url }}"
          echo "API     : ${{ needs.deploy-api.outputs.api_url || inputs.api_url_override }}"
          echo "Login   : admin@geodisha.com / admin123"
          echo "================================================"
