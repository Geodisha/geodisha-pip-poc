name: Deploy Web to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

env:
  PROJECT_ID:   geo-pulse-463507
  REGION:       asia-south1
  REGISTRY:     asia-south1-docker.pkg.dev
  IMAGE:        asia-south1-docker.pkg.dev/geo-pulse-463507/docker/geodisha-pip-web
  SERVICE:      geodisha-pip-web
  WIF_PROVIDER: projects/48276813435/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  SA_EMAIL:     github-actions-sa@geo-pulse-463507.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build Flutter Web and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # API_BASE_URL is a repo-level VARIABLE (not secret) set on geodisha-pip-poc only.
      # It has zero effect on any other repo. Set it at:
      # Repo > Settings > Secrets and variables > Actions > Variables tab > New variable
      # Name: API_BASE_URL  Value: <your Cloud Run API URL from deploy-api run>
      - name: Patch API base URL
        working-directory: mobile
        run: |
          API_URL="${{ vars.API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            echo "ERROR: Set repo variable API_BASE_URL to the Cloud Run API URL first"
            echo "Go to: Repo Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi
          sed -i "s|http://localhost:8000|${API_URL}|g" lib/core/constants/api_endpoints.dart
          echo "Patched baseUrl to: ${API_URL}"
          grep "baseUrl" lib/core/constants/api_endpoints.dart

      - name: Build Flutter Web
        working-directory: mobile
        run: |
          flutter build web \
            --release \
            --base-href / \
            --web-renderer canvaskit

      - name: Build and push Docker image
        working-directory: mobile
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=3

      - name: Print deployed URL
        run: |
          echo "================================================"
          echo "Web deployed: ${{ steps.deploy.outputs.url }}"
          echo "Login: admin@geodisha.com / admin123"
          echo "================================================"
