name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  PROJECT_ID:   geo-pulse-463507
  REGION:       asia-south1
  REGISTRY:     asia-south1-docker.pkg.dev
  IMAGE:        asia-south1-docker.pkg.dev/geo-pulse-463507/docker/geodisha-pip-api
  SERVICE:      geodisha-pip-api
  WIF_PROVIDER: projects/48276813435/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  SA_EMAIL:     github-actions-sa@geo-pulse-463507.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Workload Identity Federation - no JSON key needed
      # This repo (Geodisha/geodisha-pip-poc) is already bound to the WIF pool
      # The same SA is shared with other Geodisha repos - repo isolation is
      # enforced by the WIF attribute.repository binding, not by separate SAs
      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./backend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=60

      - name: Print deployed URL
        run: |
          echo "================================================"
          echo "API deployed: ${{ steps.deploy.outputs.url }}"
          echo "NEXT: Set repo variable API_BASE_URL to this URL"
          echo "Settings > Secrets and variables > Actions > Variables"
          echo "================================================"
